<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>2026 樂朗奇春酒抽獎系統 - 專業決策版</title>
    <style>
        :root { --gold: #C5A059; --bg: #F9F7F2; --dark: #2C2C2C; --red: #D44B4B; --gray: #888; }
        * { box-sizing: border-box; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--dark); }
        
        /* 側欄 */
        .sidebar { width: 22%; padding: 25px; background: rgba(255,255,255,0.8); border-right: 1px solid #ddd; overflow-y: auto; }
        .sidebar-right { border-right: none; border-left: 1px solid #ddd; }
        h2 { border-bottom: 3px solid var(--gold); padding-bottom: 10px; font-size: 1.6rem; margin-top: 0; color: var(--gold); }
        
        /* 中央抽獎區 */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 30px; }
        
        /* 規則看板 (新增) */
        .rule-board { width: 100%; background: #fff; border: 2px solid var(--gold); border-radius: 15px; padding: 15px; display: flex; justify-content: space-around; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .rule-step { text-align: center; opacity: 0.4; transition: 0.5s; flex: 1; border-right: 1px solid #eee; }
        .rule-step:last-child { border-right: none; }
        .rule-step.active { opacity: 1; transform: scale(1.05); }
        .rule-step.active .step-title { color: var(--red); font-weight: bold; }
        .step-title { font-size: 1.2rem; margin-bottom: 5px; }
        .step-info { font-size: 0.9rem; color: var(--gray); line-height: 1.4; }

        /* 抽獎主視覺 */
        #display-name { font-size: 9rem; font-weight: bold; color: var(--gold); text-shadow: 3px 3px 10px rgba(0,0,0,0.1); margin: 20px 0; }
        .prize-banner { font-size: 2.5rem; font-weight: bold; color: var(--red); }

        /* 名單列表樣式 */
        .list-item { font-size: 1.2rem; padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .tier-tag { font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; background: #eee; margin-right: 8px; font-weight: normal; }
        .winner-amount { color: var(--red); font-weight: bold; }

        /* 按鈕 */
        .btn-group { width: 100%; max-width: 400px; margin-bottom: 20px; }
        button { background: var(--gold); color: white; border: none; padding: 20px; border-radius: 50px; font-size: 1.8rem; cursor: pointer; width: 100%; box-shadow: 0 5px 15px rgba(197, 160, 89, 0.4); }
        
        /* 決策彈窗 */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 700px; border: 5px solid var(--gold); }
        .modal-title { font-size: 3rem; color: var(--red); margin-bottom: 20px; font-weight: bold; }
        .decision-btn-group { display: flex; gap: 20px; margin-top: 30px; }
        .btn-keep { background: #40c057; font-size: 1.5rem; }
        .btn-abandon { background: var(--red); font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>待抽名單 (<span id="rem-count">15</span>)</h2>
        <div id="remaining-list"></div>
    </div>

    <div class="main">
        <div class="rule-board">
            <div id="rule-0" class="rule-step">
                <div class="step-title">第一輪：三等獎</div>
                <div class="step-info">$3,000 (共4名)<br>全員皆可參與</div>
            </div>
            <div id="rule-1" class="rule-step">
                <div class="step-title">第二輪：二等獎</div>
                <div class="step-info">$5,000 (共2名)<br>限 1、2 區參加</div>
            </div>
            <div id="rule-2" class="rule-step">
                <div class="step-title">最終輪：特等獎</div>
                <div class="step-info">$15,000 (共1名)<br>🔒 僅限第 1 區</div>
            </div>
        </div>

        <div style="text-align: center;">
            <div id="prize-banner" class="prize-banner">準備開獎</div>
            <div id="display-name">---</div>
        </div>

        <div class="btn-group">
            <button id="btn-draw" onclick="toggleRoll()">開始抽獎</button>
            <p style="color: #aaa; margin-top: 10px; font-size: 0.9rem;">註：未中獎者皆可領取 $1,000 普獎紅包</p>
        </div>
    </div>

    <div class="sidebar sidebar-right">
        <h2>已得獎紀錄</h2>
        <div id="winner-list"></div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div class="modal-title">⚠ 關鍵決策 ⚠</div>
            <p id="decision-text" style="font-size: 1.6rem; line-height: 1.6; text-align: left; background: #fff9db; padding: 20px; border-radius: 10px;"></p>
            <div class="decision-btn-group">
                <button class="btn-keep" onclick="confirmDecision(true)">領取獎金並退出</button>
                <button class="btn-abandon" onclick="confirmDecision(false)">放棄獎金，拚 $15,000！</button>
            </div>
            <p style="margin-top: 20px; color: #888;">*提醒：若放棄後最後大獎未中，仍保底領取 $1,000 普獎。</p>
        </div>
    </div>

<script>
    const employees = [
        {name: "蔡珺如", d: 1}, {name: "陳彥竹", d: 1}, {name: "吳忠叡", d: 1}, 
        {name: "石佩嬭", d: 1}, {name: "楊家豪", d: 1}, {name: "陳宜璟", d: 1},
        {name: "李青秀", d: 2}, {name: "李嘉芯", d: 2}, {name: "呂佳恩", d: 2}, 
        {name: "黃雅婷", d: 2}, {name: "張瑜庭", d: 2},
        {name: "胡青瑩", d: 3}, {name: "周子容", d: 3}, {name: "陳秋河", d: 3}, {name: "馮佳卉", d: 3}
    ];

    const rounds = [
        {t: "三等獎", a: "$3,000", c: 4, pool: [1,2,3]},
        {t: "二等獎", a: "$5,000", c: 2, pool: [1,2]},
        {t: "特等獎", a: "$15,000", c: 1, pool: [1]}
    ];

    let rIdx = 0, dCount = 0, winners = [], isRolling = false, timer, currentWinner;

    function refreshLists() {
        // 更新左側候選名單
        const remList = document.getElementById('remaining-list');
        const remPool = employees.filter(e => !winners.includes(e.name));
        document.getElementById('rem-count').innerText = remPool.length;
        remList.innerHTML = remPool.map(e => `
            <div class="list-item"><span><span class="tier-tag">${e.d}區</span>${e.name}</span></div>
        `).join('');

        // 更新規則看板狀態
        document.querySelectorAll('.rule-step').forEach((el, idx) => {
            el.classList.toggle('active', idx === rIdx);
        });

        // 更新中央資訊
        const round = rounds[rIdx];
        if (round) {
            document.getElementById('prize-banner').innerText = `${round.t} (${dCount + 1}/${round.count || round.c})`;
        } else {
            document.getElementById('prize-banner').innerText = "全體抽獎完畢";
            document.getElementById('btn-draw').style.display = "none";
        }
    }
    refreshLists();

    function toggleRoll() {
        if(isRolling) {
            clearInterval(timer);
            isRolling = false;
            currentWinner = employees.find(e => e.name === document.getElementById('display-name').innerText);
            
            // 觸發決策：如果是第一區員工 且 抽中的不是特等獎
            if(currentWinner.d === 1 && rIdx < 2) {
                const tier1Count = employees.filter(e => e.d === 1 && !winners.includes(e.name)).length;
                document.getElementById('decision-text').innerHTML = 
                    `恭喜 <strong>${currentWinner.name}</strong> 抽中 ${rounds[rIdx].t}！<br><br>` +
                    `目前第 1 區剩餘人數：<strong>${tier1Count} 人</strong> (含你)<br>` +
                    `最後大獎機會：<strong>1 / ${tier1Count}</strong> 抽中 $15,000<br><br>` +
                    `您要領取這份 ${rounds[rIdx].a}？還是要拼大獎？`;
                document.getElementById('modal').style.display = "flex";
            } else {
                saveWinner();
            }
        } else {
            const pool = employees.filter(e => rounds[rIdx].pool.includes(e.d) && !winners.includes(e.name));
            if(pool.length === 0) return alert("本輪無符合資格者");
            isRolling = true;
            document.getElementById('btn-draw').innerText = "停止";
            timer = setInterval(() => {
                document.getElementById('display-name').innerText = pool[Math.floor(Math.random()*pool.length)].name;
            }, 50);
        }
    }

    function confirmDecision(keep) {
        document.getElementById('modal').style.display = "none";
        if(keep) {
            saveWinner();
        } else {
            document.getElementById('display-name').innerText = "---";
        }
        document.getElementById('btn-draw').innerText = "開始抽獎";
    }

    function saveWinner() {
        winners.push(currentWinner.name);
        const winList = document.getElementById('winner-list');
        winList.innerHTML = `<div class="list-item"><span>${currentWinner.name}</span><span class="winner-amount">${rounds[rIdx].a}</span></div>` + winList.innerHTML;
        dCount++;
        if(dCount >= rounds[rIdx].c) { rIdx++; dCount = 0; }
        refreshLists();
        document.getElementById('btn-draw').innerText = "開始抽獎";
    }
</script>
</body>
</html>
